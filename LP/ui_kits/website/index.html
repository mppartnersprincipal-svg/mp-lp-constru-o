<!doctype html>
<!-- @dsCard group="UI Kit — Website" name="Website — Marketing Site" subtitle="Full click-thru: nav, hero, services, clients, testimonials, form, footer" viewport="1280x900" -->
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MP Assessoria Digital</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; padding: 0; background: var(--bg-page); color: var(--fg-1); scroll-behavior: smooth; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Button.jsx"></script>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Clients.jsx"></script>
  <script type="text/babel" src="Testimonials.jsx"></script>
  <script type="text/babel" src="ContactForm.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    function App() {
      const [active, setActive] = React.useState('inicio');
      React.useEffect(() => {
        const createIcons = () => window.lucide && window.lucide.createIcons();
        createIcons();
        const obs = new MutationObserver(createIcons);
        obs.observe(document.body, { childList: true, subtree: true });
        return () => obs.disconnect();
      }, []);
      const go = (id) => {
        setActive(id);
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
      return (
        <>
          <Nav active={active} onNav={go} />
          <Hero onPrimary={() => go('contato')} onSecondary={() => go('cases')} />
          <Services />
          <Clients />
          <Testimonials />
          <Contact />
          <Footer />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
