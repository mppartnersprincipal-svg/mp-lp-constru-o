<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing — 4px Scale" subtitle="Token → px → visual bar" viewport="700x400" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); color:var(--fg-2); font-family:var(--font-body); font-size:12px;}
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px dashed var(--border-1); }
  th { font-family:var(--font-display); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); font-weight:700; }
  td code { font-family:var(--font-mono); background:transparent; padding:0; color:var(--yellow-200); font-size:11px; }
  td b { font-family:var(--font-display); color:var(--fg-1); font-weight:600; }
  .bar { display:block; height:14px; border-radius:3px; background:var(--accent); }
</style></head>
<body>
  <table>
    <tr><th>Token</th><th>px</th><th>Scale</th></tr>
    <tr><td><b>--s-1</b></td><td><code>4</code></td><td><span class="bar" style="width:4px"></span></td></tr>
    <tr><td><b>--s-2</b></td><td><code>8</code></td><td><span class="bar" style="width:8px"></span></td></tr>
    <tr><td><b>--s-3</b></td><td><code>12</code></td><td><span class="bar" style="width:12px"></span></td></tr>
    <tr><td><b>--s-4</b></td><td><code>16</code></td><td><span class="bar" style="width:16px"></span></td></tr>
    <tr><td><b>--s-6</b></td><td><code>24</code></td><td><span class="bar" style="width:24px"></span></td></tr>
    <tr><td><b>--s-8</b></td><td><code>32</code></td><td><span class="bar" style="width:32px"></span></td></tr>
    <tr><td><b>--s-10</b></td><td><code>40</code></td><td><span class="bar" style="width:40px"></span></td></tr>
    <tr><td><b>--s-12</b></td><td><code>48</code></td><td><span class="bar" style="width:48px"></span></td></tr>
    <tr><td><b>--s-16</b></td><td><code>64</code></td><td><span class="bar" style="width:64px"></span></td></tr>
    <tr><td><b>--s-20</b></td><td><code>80</code></td><td><span class="bar" style="width:80px"></span></td></tr>
    <tr><td><b>--s-24</b></td><td><code>96</code></td><td><span class="bar" style="width:96px"></span></td></tr>
    <tr><td><b>--s-32</b></td><td><code>128</code></td><td><span class="bar" style="width:128px"></span></td></tr>
  </table>
</body></html>
