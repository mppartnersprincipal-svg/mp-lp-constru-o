<!doctype html>
<!-- @dsCard group="Components" name="Components — Metric Callout" subtitle="Big yellow numbers for social proof" viewport="700x180" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); display:grid; grid-template-columns:repeat(3,1fr); gap:18px;}
  .m { background:var(--bg-card); border:1px solid var(--border-1); border-radius:12px; padding:22px; text-align:left;}
  .num { font-family:var(--font-display); font-weight:900; font-size:56px; line-height:1; letter-spacing:-.02em; color:var(--accent); margin:0;}
  .lab { font-family:var(--font-display); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin:0 0 8px;}
  .cap { font-family:var(--font-body); font-size:12px; color:var(--fg-2); margin-top:6px;}
</style></head>
<body>
  <div class="m"><p class="lab">Faturamento</p><p class="num">+130%</p><p class="cap">média em 6 meses</p></div>
  <div class="m"><p class="lab">ROI</p><p class="num">5.4x</p><p class="cap">retorno em mídia paga</p></div>
  <div class="m"><p class="lab">Clientes</p><p class="num">+42</p><p class="cap">empresas atendidas</p></div>
</body></html>
