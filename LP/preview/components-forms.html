<!doctype html>
<!-- @dsCard group="Components" name="Components — Form Inputs" subtitle="Text · select · textarea · error" viewport="700x380" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  label { font-family:var(--font-body); font-size:12px; color:var(--fg-3); display:block; margin-bottom:6px;}
  .input, select, textarea { width:100%; box-sizing:border-box; background:var(--bg-card); border:1px solid var(--border-1); color:var(--fg-1); border-radius:8px; padding:14px 16px; font-family:var(--font-body); font-size:14px; outline:none; transition:border 160ms, box-shadow 160ms;}
  .input:focus, select:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(245,166,35,0.2);}
  .field { display:flex; flex-direction:column; }
  .field.full { grid-column:1 / -1; }
  textarea { resize:none; height:80px; font-family:var(--font-body);}
  .err { border-color:var(--danger) !important;}
  .hint { font-size:11px; color:var(--danger); margin-top:4px; font-family:var(--font-body);}
  select { appearance:none; background-image:linear-gradient(45deg,transparent 50%,#F5A623 50%),linear-gradient(135deg,#F5A623 50%,transparent 50%); background-position:calc(100% - 18px) 50%, calc(100% - 13px) 50%; background-size:5px 5px; background-repeat:no-repeat;}
</style></head>
<body>
  <div class="field"><label>Nome</label><input class="input" value="Marcos Pereira"></div>
  <div class="field"><label>Email</label><input class="input" value="marcos@empresa.com.br"></div>
  <div class="field"><label>Telefone</label><input class="input" placeholder="(11) 90000-0000"></div>
  <div class="field"><label>Empresa</label><input class="input err" value=""><div class="hint">Campo obrigatório</div></div>
  <div class="field full"><label>Serviço de interesse</label>
    <select><option>Selecione um serviço</option><option>Tráfego Pago</option><option>CRM & Automação</option><option>Consultoria</option></select>
  </div>
  <div class="field full"><label>Mensagem</label><textarea placeholder="Conte um pouco sobre o momento da sua empresa…"></textarea></div>
</body></html>
