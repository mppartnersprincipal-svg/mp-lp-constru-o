<!doctype html>
<!-- @dsCard group="Brand" name="Brand — Logo Lockups" subtitle="Yellow on dark · black on white · mark" viewport="700x380" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:30px; background:var(--bg-page); display:grid; grid-template-columns:1fr 1fr; gap:22px;}
  .tile { border:1px solid var(--border-1); border-radius:12px; padding:28px; display:flex; align-items:center; justify-content:center;}
  .dark { background:#0A0A0A;}
  .light { background:#FFF;}
  .mid { background:#1A1A1A;}
  .tile img { height:72px;}
  .cap { grid-column:1/-1; font-family:var(--font-body); font-size:12px; color:var(--fg-3); text-align:center;}
</style></head>
<body>
  <div class="tile dark"><img src="../assets/logo-mp-full.svg"></div>
  <div class="tile light"><img src="../assets/logo-mp-full-black.svg"></div>
  <div class="tile mid"><img src="../assets/logo-mp-mark.svg"></div>
  <div class="tile light"><img src="../assets/logo-mp-mark-white.svg" style="filter:invert(1)"></div>
  <div class="cap">Full lockup (yellow + wordmark) for heroes & footers · monogram for nav, favicons, tight spaces.</div>
</body></html>
