<!doctype html>
<!-- @dsCard group="Colors" name="Colors — Primary (Yellow)" subtitle="8-step brand yellow scale · #F5A623 hero" viewport="700x200" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-page); }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
  .sw { border:1px solid var(--border-1); border-radius:var(--r-sm); overflow:hidden; background:var(--bg-card); }
  .chip { height:64px; }
  .meta { padding:8px 10px; display:flex; justify-content:space-between; font-family:var(--font-body); font-size:11px; color:var(--fg-2); }
  .meta b { color:var(--fg-1); font-weight:600; font-family:var(--font-display); }
  .meta code { background:transparent; padding:0; color:var(--fg-3); font-size:10px; }
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FFF7E6"></div><div class="meta"><b>yellow-50</b><code>#FFF7E6</code></div></div>
    <div class="sw"><div class="chip" style="background:#FDEABF"></div><div class="meta"><b>yellow-100</b><code>#FDEABF</code></div></div>
    <div class="sw"><div class="chip" style="background:#FBD58A"></div><div class="meta"><b>yellow-200</b><code>#FBD58A</code></div></div>
    <div class="sw"><div class="chip" style="background:#F8BF55"></div><div class="meta"><b>yellow-300</b><code>#F8BF55</code></div></div>
    <div class="sw" style="outline:2px solid var(--accent); outline-offset:-2px"><div class="chip" style="background:#F5A623"></div><div class="meta"><b>yellow-400 ★</b><code>#F5A623</code></div></div>
    <div class="sw"><div class="chip" style="background:#E0921A"></div><div class="meta"><b>yellow-500</b><code>#E0921A</code></div></div>
    <div class="sw"><div class="chip" style="background:#C47C0F"></div><div class="meta"><b>yellow-600</b><code>#C47C0F</code></div></div>
    <div class="sw"><div class="chip" style="background:#8F5A08"></div><div class="meta"><b>yellow-700</b><code>#8F5A08</code></div></div>
  </div>
</body></html>
