<!doctype html>
<!-- @dsCard group="Components" name="Components — Service Card" subtitle="Icon + title + bullets, default + featured" viewport="700x260" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin:0; padding:24px; background:var(--bg-page); display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .card { background:var(--bg-card); border:1px solid var(--border-1); border-radius:12px; padding:24px; transition:all 200ms cubic-bezier(0.22,1,0.36,1); }
  .card:hover { background:var(--bg-card-hover); border-color:var(--border-2); transform:translateY(-2px);}
  .icon { color:var(--accent); margin-bottom:14px; }
  .card h3 { font-family:var(--font-display); font-weight:700; font-size:20px; color:var(--fg-1); margin:0 0 8px;}
  .card p { font-family:var(--font-body); font-size:13px; color:var(--fg-2); line-height:1.55; margin:0 0 12px;}
  .card ul { list-style:none; padding:0; margin:0; font-family:var(--font-body); font-size:13px; color:var(--fg-2);}
  .card li { display:flex; gap:8px; padding:4px 0;}
  .card li svg { color:var(--accent); flex:0 0 14px; margin-top:3px;}
  .feature { background:var(--bg-card); border:1px solid var(--accent); }
</style></head>
<body>
  <div class="card">
    <i class="icon" data-lucide="trending-up" style="width:32px;height:32px"></i>
    <h3>Tráfego Pago</h3>
    <p>Campanhas performáticas em Meta Ads e Google Ads.</p>
    <ul>
      <li><i data-lucide="check" style="width:14px;height:14px"></i>ROI mensurável</li>
      <li><i data-lucide="check" style="width:14px;height:14px"></i>Otimização diária</li>
    </ul>
  </div>
  <div class="card feature">
    <i class="icon" data-lucide="target" style="width:32px;height:32px"></i>
    <h3>Consultoria Estratégica</h3>
    <p>Diagnóstico completo e plano de crescimento.</p>
    <ul>
      <li><i data-lucide="check" style="width:14px;height:14px"></i>Plano 90 dias</li>
      <li><i data-lucide="check" style="width:14px;height:14px"></i>Reuniões semanais</li>
    </ul>
  </div>
<script>lucide.createIcons();</script>
</body></html>
