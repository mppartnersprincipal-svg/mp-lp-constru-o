<!doctype html>
<!-- @dsCard group="Colors" name="Colors — Neutrals" subtitle="Dark-first neutral scale, black → white" viewport="700x170" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--bg-page); }
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; }
  .sw { border:1px solid var(--border-1); border-radius:var(--r-sm); overflow:hidden; }
  .chip { height:56px; }
  .meta { padding:6px 8px; font-family:var(--font-body); font-size:10px; color:var(--fg-2); background:var(--bg-card); }
  .meta b { color:var(--fg-1); display:block; font-family:var(--font-display); font-weight:600; font-size:11px; }
  .meta code { background:transparent; padding:0; color:var(--fg-3); font-size:9px; }
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#000"></div><div class="meta"><b>black</b><code>#000000</code></div></div>
    <div class="sw"><div class="chip" style="background:#0A0A0A"></div><div class="meta"><b>gray-0</b><code>#0A0A0A</code></div></div>
    <div class="sw"><div class="chip" style="background:#111"></div><div class="meta"><b>gray-50</b><code>#111111</code></div></div>
    <div class="sw"><div class="chip" style="background:#1A1A1A"></div><div class="meta"><b>gray-100</b><code>#1A1A1A</code></div></div>
    <div class="sw"><div class="chip" style="background:#1F1F1F"></div><div class="meta"><b>gray-150</b><code>#1F1F1F</code></div></div>
    <div class="sw"><div class="chip" style="background:#262626"></div><div class="meta"><b>gray-200</b><code>#262626</code></div></div>
    <div class="sw"><div class="chip" style="background:#333"></div><div class="meta"><b>gray-300</b><code>#333333</code></div></div>
    <div class="sw"><div class="chip" style="background:#4D4D4D"></div><div class="meta"><b>gray-400</b><code>#4D4D4D</code></div></div>
    <div class="sw"><div class="chip" style="background:#737373"></div><div class="meta"><b>gray-500</b><code>#737373</code></div></div>
    <div class="sw"><div class="chip" style="background:#A3A3A3"></div><div class="meta"><b>gray-600</b><code>#A3A3A3</code></div></div>
    <div class="sw"><div class="chip" style="background:#D4D4D4"></div><div class="meta"><b>gray-700</b><code>#D4D4D4</code></div></div>
    <div class="sw"><div class="chip" style="background:#FFF"></div><div class="meta"><b>white</b><code>#FFFFFF</code></div></div>
  </div>
</body></html>
