<!doctype html>
<!-- @dsCard group="Components" name="Components — Navigation" subtitle="Logo left · links center · yellow CTA right" viewport="700x90" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:var(--bg-page);}
  .nav { display:flex; align-items:center; justify-content:space-between; padding:18px 32px; border-bottom:1px solid var(--border-1); background:rgba(10,10,10,0.8); backdrop-filter:blur(12px);}
  .logo { display:flex; align-items:center; gap:10px;}
  .logo svg { height:28px;}
  .links { display:flex; gap:28px; font-family:var(--font-body); font-size:14px; color:var(--fg-2);}
  .links a { color:inherit; text-decoration:none;}
  .links a.active { color:var(--accent);}
  .cta { font-family:var(--font-display); font-weight:700; font-size:12px; letter-spacing:.08em; text-transform:uppercase; background:var(--accent); color:#000; padding:10px 18px; border-radius:999px; border:0;}
</style></head>
<body>
  <nav class="nav">
    <div class="logo">
      <img src="../assets/logo-mp-mark.svg" style="height:28px">
      <span style="font-family:var(--font-display); font-weight:700; color:#fff; letter-spacing:.12em; font-size:12px">ASSESSORIA</span>
    </div>
    <div class="links">
      <a class="active">Início</a><a>Serviços</a><a>Cases</a><a>Sobre</a><a>Contato</a>
    </div>
    <button class="cta">AGENDAR DIAGNÓSTICO</button>
  </nav>
</body></html>
