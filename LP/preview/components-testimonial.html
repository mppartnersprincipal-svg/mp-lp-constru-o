<!doctype html>
<!-- @dsCard group="Components" name="Components — Testimonial" subtitle="Quote + avatar + name + company" viewport="700x280" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page);}
  .t { background:var(--bg-card); border:1px solid var(--border-1); border-radius:16px; padding:28px; max-width:620px;}
  .quote-mark { font-family:var(--font-display); font-size:48px; font-weight:900; color:var(--accent); line-height:1; margin-bottom:6px;}
  .quote { font-family:var(--font-body); font-size:17px; color:var(--fg-1); line-height:1.55; margin:0 0 18px; font-style:normal;}
  .row { display:flex; gap:12px; align-items:center;}
  .ava { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#F5A623,#8F5A08); display:flex; align-items:center; justify-content:center; color:#000; font-family:var(--font-display); font-weight:700;}
  .name { font-family:var(--font-display); font-weight:600; color:var(--fg-1); font-size:14px;}
  .co { font-family:var(--font-body); font-size:12px; color:var(--fg-3);}
</style></head>
<body>
  <div class="t">
    <div class="quote-mark">"</div>
    <p class="quote">Em 4 meses saímos de R$ 180k para R$ 420k de faturamento mensal. A estrutura de CRM e tráfego que a MP montou é o que a gente não tinha conseguido fazer sozinhos em 2 anos.</p>
    <div class="row">
      <div class="ava">RC</div>
      <div><div class="name">Renata Castro</div><div class="co">CEO · Studio Norte Arquitetura</div></div>
    </div>
  </div>
</body></html>
