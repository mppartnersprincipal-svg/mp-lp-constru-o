<!doctype html>
<!-- @dsCard group="Brand" name="Brand — Hero Pattern" subtitle="Eyebrow + H1 + sub + dual CTA + yellow glow" viewport="700x340" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:32px; background:var(--bg-page);}
  .hero { position:relative; border-radius:16px; padding:48px; overflow:hidden; background:var(--bg-section); border:1px solid var(--border-1);}
  .hero::before { content:''; position:absolute; inset:auto -120px -120px auto; width:360px; height:360px; background:radial-gradient(closest-side, rgba(245,166,35,0.18), transparent 70%); pointer-events:none;}
  .eyebrow { font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); margin:0 0 14px;}
  h1 { font-family:var(--font-display); font-weight:900; font-size:44px; line-height:1.05; letter-spacing:-.02em; color:#fff; margin:0 0 14px; max-width:540px;}
  .sub { font-family:var(--font-body); font-size:15px; color:var(--fg-2); max-width:520px; line-height:1.55; margin:0 0 24px;}
  .cta-row { display:flex; gap:12px;}
  .p { background:var(--accent); color:#000; font-family:var(--font-display); font-weight:700; font-size:12px; letter-spacing:.08em; text-transform:uppercase; border:0; border-radius:999px; padding:14px 22px;}
  .g { background:transparent; color:#fff; border:1px solid rgba(255,255,255,.4); font-family:var(--font-display); font-weight:700; font-size:12px; letter-spacing:.08em; text-transform:uppercase; border-radius:999px; padding:14px 22px;}
</style></head>
<body>
  <div class="hero">
    <p class="eyebrow">MP · ASSESSORIA DIGITAL</p>
    <h1>Transforme tráfego em faturamento previsível.</h1>
    <p class="sub">Gestão de marketing digital para empresas que já faturam e querem escalar com controle, não com sorte.</p>
    <div class="cta-row">
      <button class="p">AGENDAR DIAGNÓSTICO</button>
      <button class="g">NOSSOS CASES</button>
    </div>
  </div>
</body></html>
