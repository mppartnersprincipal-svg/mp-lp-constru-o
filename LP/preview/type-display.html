<!doctype html>
<!-- @dsCard group="Type" name="Type — Display & Headings" subtitle="Montserrat 900/700 · display → h3" viewport="700x360" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:var(--bg-page); color:var(--fg-1); }
  .stack > * + * { margin-top:14px; }
  .label { font-family:var(--font-display); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); }
  .s-display { font-family:var(--font-display); font-weight:900; font-size:96px; line-height:1; letter-spacing:-.02em; color:var(--accent); }
  .s-h1 { font-family:var(--font-display); font-weight:900; font-size:56px; line-height:1.05; letter-spacing:-.02em; }
  .s-h2 { font-family:var(--font-display); font-weight:700; font-size:40px; line-height:1.15; letter-spacing:-.02em; }
  .s-h3 { font-family:var(--font-display); font-weight:700; font-size:28px; line-height:1.15; }
</style></head>
<body>
  <div class="stack">
    <div><div class="label">Display · Montserrat 900 · 96 / 1.0 / -.02em</div><div class="s-display">+130%</div></div>
    <div><div class="label">H1 · Montserrat 900 · 56 / 1.05</div><div class="s-h1">Faturamento previsível.</div></div>
    <div><div class="label">H2 · Montserrat 700 · 40 / 1.15</div><div class="s-h2">Crescer com controle, não com sorte</div></div>
    <div><div class="label">H3 · Montserrat 700 · 28 / 1.15</div><div class="s-h3">Tráfego Pago · CRM · Consultoria</div></div>
  </div>
</body></html>
