<!doctype html>
<!-- @dsCard group="Components" name="Components — Badges & Eyebrows" subtitle="Soft yellow, outline, solid, success" viewport="700x180" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:32px; background:var(--bg-page); display:flex; flex-direction:column; gap:16px; align-items:flex-start;}
  .badge { display:inline-flex; align-items:center; gap:6px; font-family:var(--font-display); font-weight:700; font-size:11px; letter-spacing:.08em; text-transform:uppercase; padding:6px 12px; border-radius:999px;}
  .dot { width:6px; height:6px; border-radius:50%;}
  .b-yellow { background:rgba(245,166,35,.12); color:var(--accent);}
  .b-yellow .dot { background:var(--accent);}
  .b-outline { border:1px solid var(--border-2); color:var(--fg-2);}
  .b-solid { background:var(--accent); color:#000;}
  .b-success { background:rgba(34,197,94,.14); color:var(--success);}
  .b-success .dot { background:var(--success);}
  .row { display:flex; gap:10px; flex-wrap:wrap;}
</style></head>
<body>
  <div class="row">
    <span class="badge b-yellow"><span class="dot"></span>NOSSOS RESULTADOS</span>
    <span class="badge b-outline">Novo</span>
    <span class="badge b-solid">PREMIUM</span>
    <span class="badge b-success"><span class="dot"></span>Ao vivo</span>
  </div>
  <div style="font-family:var(--font-display); font-size:11px; color:var(--fg-3); letter-spacing:.08em; text-transform:uppercase;">Eyebrow labels — sit above section titles, single line, yellow.</div>
</body></html>
